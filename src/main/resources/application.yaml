spring:
  application:
    name: account-access-consents-services
  profiles:
    active: "dev"
  jmx:
    enabled: false

debug: false
server:
  port: 8080

management:
  tracing:
    enabled: true
    propagation:
      type: b3
    sampling:
      probability: 1.0
  # zipkin:
  #   tracing:
  #     endpoint: http://localhost:9411/api/v2/spans
  server:
    port: 8080
  endpoints:
    web:
      exposure:
        include: '*'
    access:
      default: READ_ONLY
  endpoint:
    health:
      show-details: always
  info:
    defaults:
      enabled: true
    git:
      enabled: true
      mode: full
    env:
      enabled: true
    build:
      enabled: true
springdoc:

  swagger-ui:
    display-request-duration: true
    groups-order: DESC
    operationsSorter: method
    disable-swagger-default-url: true
    use-root-path: true
  show-actuator: false
  
artifact:
  groupId: '@project.groupId@'
  artifactId: '@project.artifactId@'
  version: '@project.version@'  
sentry:
  dsn: ${SENTRY_DSN_ACCOUNT_ACCESS_CONSENTS_SERVICES}
  send-default-pii: true    
  # Enable sending logs to Sentry
  logs:
    enabled: true
  # Set traces-sample-rate to 1.0 to capture 100% of transactions for tracing.
  # We recommend adjusting this value in production.
  traces-sample-rate: 1.0
  # Set profile-session-sample-rate to 1.0 to profile 100% of profile sessions.
  profile-session-sample-rate: 1.0
  # Set profile-lifecycle to trace to automatically start and stop
  # profiling when a transaction starts and finishes.
  profile-lifecycle: TRACE  